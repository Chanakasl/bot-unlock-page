<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Video Player</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <style>
    body { 
      background-color: #0c0c0c; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
    }
    .video-container { 
      width: 100%; 
      max-width: 900px; 
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); 
    }
    /* Disable default download button in Chrome/Edge */
    video::-webkit-media-controls-enclosure {
      overflow: hidden;
    }
    video::-webkit-media-controls-panel {
      width: calc(100% + 30px);
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="video-container">
    <video 
      id="my-video" 
      class="video-js vjs-theme-city vjs-big-play-centered" 
      controls 
      preload="auto" 
      width="100%" 
      height="100%" 
      controlsList="nodownload" 
      data-setup='{"fluid": true, "playbackRates": [0.5, 1, 1.5, 2]}'>
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script>
    // URL එකෙන් Encrypt කරපු ලින්ක් එක ගැනීම
    const urlParams = new URLSearchParams(window.location.search);
    const encodedSrc = urlParams.get('src');

    if (encodedSrc) {
      try {
        // Base64 Decode කිරීම
        const videoSrc = atob(encodedSrc);
        const player = videojs('my-video');
        
        player.src({ src: videoSrc, type: 'video/mp4' }); // Type එක අවශ්‍ය පරිදි වෙනස් විය හැක
        
        // HTML5 Video element එකෙන් download අයින් කිරීම
        const videoElement = document.querySelector('video');
        videoElement.setAttribute('controlsList', 'nodownload');
      } catch(e) {
        alert("Invalid Video Source!");
      }
    } else {
      document.body.innerHTML = "<h2 style='color:#ff4444; text-align:center; font-family:sans-serif;'>No Video Found!</h2>";
    }
  </script>

</body>
</html>
