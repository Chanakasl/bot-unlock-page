<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Secure Player</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0d0d0d; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
            padding: 10px;
        }
        
        /* PC සහ Mobile දෙකටම ඔටෝ සෙට් වෙන Responsive Ad Container */
        .ad-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin: 10px 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.4);
            border: 2px solid #dc143c;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: absolute;
            top: 0;
            left: 0;
        }

        /* නොපෙනෙන Ad Overlay කවරය */
        #ad-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            background: rgba(0,0,0,0);
        }

        .error-msg { 
            color: #dc143c; 
            font-family: sans-serif; 
            font-size: 20px; 
            text-align: center; 
            margin-top: 15%; 
            padding: 20px; 
            position: relative;
            z-index: 5;
        }
        .error-sub { color: #aaaaaa; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. ඉහළ Ad එක (Top Responsive Banner) -->
    <div class="ad-container" id="top-ad">
        <script async="async" data-cfasync="false" src="https://pl30315607.effectivecpmnetwork.com/9a01c975ec98b2c17e8e807fac8c7a7c/invoke.js"></script>
        <div id="container-9a01c975ec98b2c17e8e807fac8c7a7c"></div>
    </div>

    <!-- වීඩියෝ ප්ලේයරය -->
    <div class="video-wrapper">
        <div class="video-container" id="video-container">
            <div class="error-msg">Loading Player...</div>
        </div>
    </div>

    <!-- 2. පහළ Ad එක (Bottom Responsive Banner) -->
    <div class="ad-container" id="bottom-ad">
        <script async="async" data-cfasync="false" src="https://pl30315607.effectivecpmnetwork.com/9a01c975ec98b2c17e8e807fac8c7a7c/invoke.js"></script>
        <div id="container-9a01c975ec98b2c17e8e807fac8c7a7c"></div>
    </div>

    <script>
        // ඔයාගේ Adsterra Smartlink (Direct Link)
        const directAdLink = "https://www.effectivecpmnetwork.com/uc05skcz3x?key=2a18479b253af98017c20535438d6be6"; 

        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data'); 
        const container = document.getElementById('video-container');

        if (encodedData) {
            try {
                const decodedData = atob(encodedData);
                const parts = decodedData.split(':::'); 

                if(parts.length === 2) {
                    const videoSrc = parts[0];
                    const expireTime = parseInt(parts[1]); 
                    const currentTime = Math.floor(Date.now() / 1000); 

                    if (currentTime > expireTime) {
                        container.innerHTML = `
                            <div class="error-msg">
                                ⚠️ This Link Has Expired!
                                <div class="error-sub">Links are only valid for 1 hour for security reasons.<br>Please generate a new link from the Telegram Bot.</div>
                            </div>`;
                    } else {
                        container.innerHTML = `
                            <div id="ad-overlay"></div>
                            <iframe src="${videoSrc}" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
                            
                        const adOverlay = document.getElementById('ad-overlay');
                        
                        adOverlay.addEventListener('click', function() {
                            if(directAdLink !== "") {
                                window.open(directAdLink, '_blank');
                            }
                            this.style.display = 'none';
                            
                            // හරියටම විනාඩි 3කින් (තත්පර 180කින්) ආයෙත් Overlay එක ඇක්ටිව් වේ
                            setTimeout(() => { 
                                this.style.display = 'block'; 
                            }, 180000); 
                        });
                    }
                } else {
                    container.innerHTML = `<div class="error-msg">Invalid Link Format!</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Invalid Video Source!</div>`;
            }
        } else {
            container.innerHTML = `<div class="error-msg">No Video Found!</div>`;
        }
    </script>
</body>
</html>
