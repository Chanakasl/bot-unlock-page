<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Secure Player</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .video-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 16 / 9; box-shadow: 0 0 25px rgba(220, 20, 60, 0.4); border: 2px solid #dc143c; border-radius: 12px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .error-msg { color: #dc143c; font-family: sans-serif; font-size: 20px; text-align: center; margin-top: 15%; padding: 20px; }
        .error-sub { color: #aaaaaa; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="video-container" id="video-container">
        <div class="error-msg">Loading Player...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // දැන් අපි ගන්නේ src නෙවෙයි, 'data' කියන parameter එක
        const encodedData = urlParams.get('data'); 
        const container = document.getElementById('video-container');

        if (encodedData) {
            try {
                const decodedData = atob(encodedData);
                const parts = decodedData.split(':::'); // ලින්ක් එක සහ වෙලාව වෙන් කිරීම

                if(parts.length === 2) {
                    const videoSrc = parts[0];
                    const expireTime = parseInt(parts[1]); // Expire වෙන වෙලාව (තත්පර වලින්)
                    const currentTime = Math.floor(Date.now() / 1000); // දැනට තියෙන වෙලාව

                    // වෙලාව පැනලාද කියලා චෙක් කිරීම
                    if (currentTime > expireTime) {
                        container.innerHTML = `
                            <div class="error-msg">
                                ⚠️ This Link Has Expired!
                                <div class="error-sub">Links are only valid for 1 hour for security reasons.<br>Please generate a new link from the Telegram Bot.</div>
                            </div>`;
                    } else {
                        // වෙලාව හරි නම් ප්ලේ කිරීම
                        container.innerHTML = `<iframe src="${videoSrc}" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
                    }
                } else {
                    container.innerHTML = `<div class="error-msg">Invalid Link Format!</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Invalid Video Source!</div>`;
            }
        } else {
            container.innerHTML = `<div class="error-msg">No Video Found!</div>`;
        }
    </script>
</body>
</html>
