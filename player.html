<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Secure Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.4);
            border: 2px solid #dc143c;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .error-msg {
            color: #dc143c;
            font-family: sans-serif;
            font-size: 20px;
            text-align: center;
            margin-top: 20%;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="video-container" id="video-container">
        <div class="error-msg" id="error-msg">Loading Player...</div>
    </div>

    <script>
        // URL එකෙන් Encrypt කරපු ලින්ක් එක ගැනීම
        const urlParams = new URLSearchParams(window.location.search);
        const encodedSrc = urlParams.get('src');
        const container = document.getElementById('video-container');

        if (encodedSrc) {
            try {
                // Base64 Decode කිරීම
                const videoSrc = atob(encodedSrc);
                
                // Iframe එකක් හරහා ප්ලේ කිරීම (Error නොඑන නිවැරදිම ක්‍රමය)
                container.innerHTML = `<iframe src="${videoSrc}" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Invalid Video Source!</div>`;
            }
        } else {
            container.innerHTML = `<div class="error-msg">No Video Found!</div>`;
        }
    </script>
</body>
</html>
