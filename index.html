<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Key</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0d0d;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }
        .container {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
            border: 1px solid #dc143c;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #dc143c; margin-bottom: 10px; font-weight: 600; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 30px; }
        .key-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            font-size: 24px;
            letter-spacing: 2px;
            color: #ff4d4d;
            border: 1px dashed #dc143c;
            margin-bottom: 25px;
            word-break: break-all;
        }
        .copy-btn {
            background: #dc143c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .copy-btn:hover { background: #ff3333; box-shadow: 0 0 15px rgba(220, 20, 60, 0.6); }
        .success { background: #28a745 !important; box-shadow: 0 0 15px rgba(40, 167, 69, 0.6) !important; border-color: #28a745 !important; color: white !important;}
        .error-msg { color: #dc143c; font-size: 18px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container" id="content-box">
        <h2>Your Verification Key</h2>
        <p>Copy the key below and send it to the Telegram Bot to unlock your video for 1 hour.</p>
        <div class="key-box" id="key-display">Loading...</div>
        <button class="copy-btn" id="copy-btn" onclick="copyKey()">Copy Key</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');
        const keyDisplay = document.getElementById('key-display');
        const copyBtn = document.getElementById('copy-btn');
        const contentBox = document.getElementById('content-box');

        if (key) {
            keyDisplay.innerText = key;
        } else {
            contentBox.innerHTML = "<div class='error-msg'>Invalid Request.<br>No key generated.</div>";
        }

        function copyKey() {
            if(!key) return;
            navigator.clipboard.writeText(key).then(() => {
                copyBtn.innerText = "Copied!";
                copyBtn.classList.add("success");
                setTimeout(() => {
                    copyBtn.innerText = "Copy Key";
                    copyBtn.classList.remove("success");
                }, 2000);
            });
        }
    </script>
</body>
</html>
